name: Codex frame date patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-frame-date-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply frame date settings patch
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function read(file) {
            return fs.readFileSync(file, 'utf8');
          }

          function write(file, text) {
            fs.writeFileSync(file, text, 'utf8');
          }

          function replaceOnce(text, from, to, label) {
            if (!text.includes(from)) throw new Error(`Missing ${label}`);
            return text.replace(from, to);
          }

          function replaceAllChecked(text, from, to, label) {
            if (!text.includes(from)) throw new Error(`Missing ${label}`);
            return text.replaceAll(from, to);
          }

          function edit(file, updater) {
            const before = read(file);
            const after = updater(before);
            if (after === before) throw new Error(`No changes for ${file}`);
            write(file, after);
          }

          function addDateApiHelpers(text) {
            return replaceOnce(text,
          `function cleanNumber(value: unknown) {
            if (typeof value === "number" && Number.isFinite(value)) return Math.trunc(value);
            if (typeof value === "string" && value.trim() && Number.isFinite(Number(value))) return Math.trunc(Number(value));
            return 0;
          }
          `,
          `function cleanNumber(value: unknown) {
            if (typeof value === "number" && Number.isFinite(value)) return Math.trunc(value);
            if (typeof value === "string" && value.trim() && Number.isFinite(Number(value))) return Math.trunc(Number(value));
            return 0;
          }

          function cleanRangeNumber(value: unknown, fallback: number, min: number, max: number) {
            const number = typeof value === "number" ? value : typeof value === "string" ? Number(value) : Number.NaN;
            if (!Number.isFinite(number)) return fallback;
            return Math.min(Math.max(Math.trunc(number), min), max);
          }

          function cleanDateColor(value: unknown) {
            const color = cleanText(value, 16);
            return /^#[0-9A-Fa-f]{6}$/.test(color) ? color : "#ffffff";
          }
          `,
          'cleanNumber helper');
          }

          edit('src/components/MosaicCanvas.tsx', (text) => {
            text = replaceOnce(text,
          '  return `${year}-${month}-${day}`;',
          '  return `${year}.${month}.${day}`;',
          'date label format');
            text = replaceOnce(text,
          `function getStoreThemeColor(store?: CaptureStore) {
            return store?.themeColor ?? FALLBACK_THEME_COLOR;
          }
          `,
          `function getStoreThemeColor(store?: CaptureStore) {
            return store?.themeColor ?? FALLBACK_THEME_COLOR;
          }

          function getSelectedFrame(store?: CaptureStore) {
            return store?.frames.find((frame) => frame.frameUrl === store.frameUrl) ?? store?.frames[0] ?? null;
          }

          function getFrameDateColor(color?: string) {
            return color && /^#[0-9A-Fa-f]{6}$/.test(color) ? color : "#ffffff";
          }

          function drawFrameDate(context: CanvasRenderingContext2D, store?: CaptureStore) {
            const frame = getSelectedFrame(store);
            if (frame?.dateEnabled === false) return;

            const fontSize = frame?.dateFontSize ?? 38;
            const x = frame?.dateX ?? CANVAS_WIDTH - 160;
            const y = frame?.dateY ?? 70;

            context.save();
            context.textBaseline = "middle";
            context.textAlign = "center";
            context.font = ` + "`" + `700 ${fontSize}px Arial, sans-serif` + "`" + `;
            context.lineWidth = Math.max(3, Math.round(fontSize * 0.12));
            context.strokeStyle = "rgba(0, 0, 0, 0.45)";
            context.fillStyle = getFrameDateColor(frame?.dateColor);
            context.strokeText(getTodayLabel(), x, y);
            context.fillText(getTodayLabel(), x, y);
            context.restore();
          }
          `,
          'frame date helpers');
            text = replaceOnce(text,
          `  context.font = "700 38px Arial, sans-serif";
            context.textAlign = "right";
            context.fillText(getTodayLabel(), CANVAS_WIDTH - 56, 70);`,
          '  drawFrameDate(context, store);',
          'fixed date drawing');
            return text;
          });

          edit('src/app/api/admin/frames/route.ts', (text) => {
            text = replaceOnce(text,
          `  sortOrder?: unknown;
          };`,
          `  sortOrder?: unknown;
            dateEnabled?: unknown;
            dateX?: unknown;
            dateY?: unknown;
            dateFontSize?: unknown;
            dateColor?: unknown;
          };`,
          'create request date fields');
            text = addDateApiHelpers(text);
            text = replaceAllChecked(text,
          'id, store_id, frame_name, frame_url, is_default, is_active, sort_order, created_at, updated_at',
          'id, store_id, frame_name, frame_url, is_default, is_active, sort_order, date_enabled, date_x, date_y, date_font_size, date_color, created_at, updated_at',
          'frame select columns');
            text = replaceOnce(text,
          `  const isActive = body.isActive === undefined ? true : Boolean(body.isActive);
            const isDefault = Boolean(body.isDefault) && isActive;`,
          `  const isActive = body.isActive === undefined ? true : Boolean(body.isActive);
            const isDefault = Boolean(body.isDefault) && isActive;
            const dateEnabled = body.dateEnabled === undefined ? true : Boolean(body.dateEnabled);`,
          'date enabled');
            text = replaceOnce(text,
          `        sort_order: cleanNumber(body.sortOrder),
              })`,
          `        sort_order: cleanNumber(body.sortOrder),
                  date_enabled: dateEnabled,
                  date_x: cleanRangeNumber(body.dateX, 1030, 0, 1270),
                  date_y: cleanRangeNumber(body.dateY, 82, 0, 890),
                  date_font_size: cleanRangeNumber(body.dateFontSize, 38, 12, 96),
                  date_color: cleanDateColor(body.dateColor),
              })`,
          'insert date fields');
            return text;
          });

          edit('src/app/api/admin/frames/[id]/route.ts', (text) => {
            text = replaceOnce(text,
          `  sortOrder?: unknown;
          };`,
          `  sortOrder?: unknown;
            dateEnabled?: unknown;
            dateX?: unknown;
            dateY?: unknown;
            dateFontSize?: unknown;
            dateColor?: unknown;
          };`,
          'update request date fields');
            text = addDateApiHelpers(text);
            text = replaceAllChecked(text,
          'id, store_id, frame_name, frame_url, is_default, is_active, sort_order, created_at, updated_at',
          'id, store_id, frame_name, frame_url, is_default, is_active, sort_order, date_enabled, date_x, date_y, date_font_size, date_color, created_at, updated_at',
          'frame select columns');
            text = replaceOnce(text,
          `  const isActive = Boolean(body.isActive);
            const isDefault = Boolean(body.isDefault) && isActive;`,
          `  const isActive = Boolean(body.isActive);
            const isDefault = Boolean(body.isDefault) && isActive;
            const dateEnabled = body.dateEnabled === undefined ? true : Boolean(body.dateEnabled);`,
          'date enabled');
            text = replaceOnce(text,
          `        sort_order: cleanNumber(body.sortOrder),
                  updated_at: new Date().toISOString(),`,
          `        sort_order: cleanNumber(body.sortOrder),
                  date_enabled: dateEnabled,
                  date_x: cleanRangeNumber(body.dateX, 1030, 0, 1270),
                  date_y: cleanRangeNumber(body.dateY, 82, 0, 890),
                  date_font_size: cleanRangeNumber(body.dateFontSize, 38, 12, 96),
                  date_color: cleanDateColor(body.dateColor),
                  updated_at: new Date().toISOString(),`,
          'update date fields');
            return text;
          });

          edit('src/components/AdminMaintenance.tsx', (text) => {
            text = replaceOnce(text,
          `  sort_order: number;
          };`,
          `  sort_order: number;
            date_enabled: boolean;
            date_x: number;
            date_y: number;
            date_font_size: number;
            date_color: string;
          };`,
          'StoreFrame date fields');
            text = replaceOnce(text,
          `  sort_order: number;
          };

          const emptyFrameDraft: FrameDraft = {`,
          `  sort_order: number;
            date_enabled: boolean;
            date_x: number;
            date_y: number;
            date_font_size: number;
            date_color: string;
          };

          const emptyFrameDraft: FrameDraft = {`,
          'FrameDraft date fields');
            text = replaceOnce(text,
          `  sort_order: 0,
          };`,
          `  sort_order: 0,
            date_enabled: true,
            date_x: 1030,
            date_y: 82,
            date_font_size: 38,
            date_color: "#ffffff",
          };`,
          'empty frame date defaults');
            text = replaceOnce(text,
          `          sortOrder: newFrameDraft.sort_order,
                  }),`,
          `          sortOrder: newFrameDraft.sort_order,
                    dateEnabled: newFrameDraft.date_enabled,
                    dateX: newFrameDraft.date_x,
                    dateY: newFrameDraft.date_y,
                    dateFontSize: newFrameDraft.date_font_size,
                    dateColor: newFrameDraft.date_color,
                  }),`,
          'create frame payload');
            text = replaceOnce(text,
          `          sortOrder: frameDraft.sort_order,
                  }),`,
          `          sortOrder: frameDraft.sort_order,
                    dateEnabled: frameDraft.date_enabled,
                    dateX: frameDraft.date_x,
                    dateY: frameDraft.date_y,
                    dateFontSize: frameDraft.date_font_size,
                    dateColor: frameDraft.date_color,
                  }),`,
          'save frame payload');
            text = replaceOnce(text,
          `            <label className="admin-toggle">
                  <input
                    type="checkbox"
                    checked={frameDraft.is_default}
                    onChange={(event) => setFrameDraft((current) => ({ ...current, is_default: event.target.checked }))}
                  />
                  標準枠
                </label>`,
          `            <label className="admin-toggle">
                  <input
                    type="checkbox"
                    checked={frameDraft.date_enabled}
                    onChange={(event) => setFrameDraft((current) => ({ ...current, date_enabled: event.target.checked }))}
                  />
                  日付を表示
                </label>
                <div className="admin-form-grid">
                  <label className="field-label">
                    日付の横位置
                    <input
                      type="number"
                      min={0}
                      max={1270}
                      value={frameDraft.date_x}
                      onChange={(event) => setFrameDraft((current) => ({ ...current, date_x: Number(event.target.value) }))}
                    />
                  </label>
                  <label className="field-label">
                    日付の縦位置
                    <input
                      type="number"
                      min={0}
                      max={890}
                      value={frameDraft.date_y}
                      onChange={(event) => setFrameDraft((current) => ({ ...current, date_y: Number(event.target.value) }))}
                    />
                  </label>
                  <label className="field-label">
                    日付の文字サイズ
                    <input
                      type="number"
                      min={12}
                      max={96}
                      value={frameDraft.date_font_size}
                      onChange={(event) => setFrameDraft((current) => ({ ...current, date_font_size: Number(event.target.value) }))}
                    />
                  </label>
                  <label className="field-label">
                    日付の色
                    <input
                      value={frameDraft.date_color}
                      onChange={(event) => setFrameDraft((current) => ({ ...current, date_color: event.target.value }))}
                    />
                  </label>
                </div>
                <label className="admin-toggle">
                  <input
                    type="checkbox"
                    checked={frameDraft.is_default}
                    onChange={(event) => setFrameDraft((current) => ({ ...current, is_default: event.target.checked }))}
                  />
                  標準枠
                </label>`,
          'date edit controls');
            return text;
          });

          edit('src/lib/supabase/types.ts', (text) => {
            text = replaceOnce(text,
          `  sort_order?: number;
            created_at?: string;`,
          `  sort_order?: number;
            date_enabled?: boolean;
            date_x?: number;
            date_y?: number;
            date_font_size?: number;
            date_color?: string;
            created_at?: string;`,
          'StoreFrameInsert date fields');
            text = replaceOnce(text,
          `          sort_order: number;
                    created_at: string;`,
          `          sort_order: number;
                    date_enabled: boolean;
                    date_x: number;
                    date_y: number;
                    date_font_size: number;
                    date_color: string;
                    created_at: string;`,
          'StoreFrame Row date fields');
            return text;
          });

          edit('supabase/schema.sql', (text) => {
            text = replaceOnce(text,
          `  sort_order integer not null default 0,
            created_at timestamptz not null default now(),`,
          `  sort_order integer not null default 0,
            date_enabled boolean not null default true,
            date_x integer not null default 1030,
            date_y integer not null default 82,
            date_font_size integer not null default 38,
            date_color text not null default '#ffffff',
            created_at timestamptz not null default now(),`,
          'schema date columns');
            text = replaceOnce(text,
          `  constraint store_frames_frame_url_not_blank check (length(trim(frame_url)) > 0),
            constraint store_frames_date_range_valid check (ends_at is null or starts_at is null or ends_at > starts_at)`,
          `  constraint store_frames_frame_url_not_blank check (length(trim(frame_url)) > 0),
            constraint store_frames_date_range_valid check (ends_at is null or starts_at is null or ends_at > starts_at),
            constraint store_frames_date_x_range check (date_x between 0 and 1270),
            constraint store_frames_date_y_range check (date_y between 0 and 890),
            constraint store_frames_date_font_size_range check (date_font_size between 12 and 96),
            constraint store_frames_date_color_format check (date_color ~ '^#[0-9A-Fa-f]{6}$')`,
          'schema date constraints');
            return text;
          });

          const migration = `-- Add printable date placement settings to each store frame.
          -- This was applied manually first in production from the Supabase SQL editor.

          alter table public.store_frames
            add column if not exists date_enabled boolean not null default true,
            add column if not exists date_x integer not null default 1030,
            add column if not exists date_y integer not null default 82,
            add column if not exists date_font_size integer not null default 38,
            add column if not exists date_color text not null default '#ffffff';

          do $$
          begin
            alter table public.store_frames
              add constraint store_frames_date_x_range check (date_x between 0 and 1270) not valid;
          exception when duplicate_object then null;
          end $$;

          do $$
          begin
            alter table public.store_frames
              add constraint store_frames_date_y_range check (date_y between 0 and 890) not valid;
          exception when duplicate_object then null;
          end $$;

          do $$
          begin
            alter table public.store_frames
              add constraint store_frames_date_font_size_range check (date_font_size between 12 and 96) not valid;
          exception when duplicate_object then null;
          end $$;

          do $$
          begin
            alter table public.store_frames
              add constraint store_frames_date_color_format check (date_color ~ '^#[0-9A-Fa-f]{6}$') not valid;
          exception when duplicate_object then null;
          end $$;

          alter table public.store_frames validate constraint store_frames_date_x_range;
          alter table public.store_frames validate constraint store_frames_date_y_range;
          alter table public.store_frames validate constraint store_frames_date_font_size_range;
          alter table public.store_frames validate constraint store_frames_date_color_format;

          update public.store_frames
          set
            date_enabled = true,
            date_x = case
              when frame_name like '%ピンク%' then 1035
              when frame_name like '%ゴールド%' then 635
              else 1030
            end,
            date_y = case
              when frame_name like '%ゴールド%' then 818
              else 82
            end,
            date_font_size = case
              when frame_name like '%ゴールド%' then 32
              else 38
            end,
            date_color = case
              when frame_name like '%ゴールド%' then '#fff4d2'
              else '#ffffff'
            end
          where frame_url like '%/test-assets/frame-%';
          `;
          write('supabase/migrations/20260704_frame_date_settings.sql', migration.replace(/^          /gm, ''));

          fs.rmSync('.github/workflows/codex-frame-date-patch.yml', { force: true });
          NODE
      - name: Commit cloud patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/MosaicCanvas.tsx src/components/AdminMaintenance.tsx src/app/api/admin/frames/route.ts 'src/app/api/admin/frames/[id]/route.ts' src/lib/supabase/types.ts supabase/schema.sql supabase/migrations/20260704_frame_date_settings.sql .github/workflows/codex-frame-date-patch.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply frame date settings in app"
            git push
          fi
